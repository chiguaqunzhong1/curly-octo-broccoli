<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金融基础考前记忆训练</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 27, 52, 0.82);
      --panel-2: rgba(255,255,255,0.06);
      --text: #eef3ff;
      --muted: #9aa8c7;
      --accent: #7aa2ff;
      --accent-2: #6ee7c8;
      --line: rgba(255,255,255,0.10);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122,162,255,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(110,231,200,0.12), transparent 26%),
        linear-gradient(180deg, #0a0f1e 0%, #0d1326 100%);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }

    .wrap {
      width: min(1200px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .section-head {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .desc {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 12px;
      width: min(520px, 100%);
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat .num {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      padding: 16px 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: .2s ease;
    }

    .switch:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
    }

    .switch-label {
      font-size: 14px;
      white-space: nowrap;
    }

    .switch-pill {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      transition: .2s ease;
      flex: 0 0 auto;
    }

    .switch-pill::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: .2s ease;
    }

    .switch.on {
      border-color: rgba(122,162,255,0.35);
      background: rgba(122,162,255,0.16);
    }

    .switch.on .switch-pill {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .switch.on .switch-pill::after {
      left: 23px;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(122,162,255,0.18);
      border-color: rgba(122,162,255,0.4);
    }

    .progress-wrap {
      padding: 14px 20px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    .module-tabs {
      padding: 16px 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: .2s ease;
    }

    .chip:hover, .chip.active {
      transform: translateY(-1px);
      background: rgba(122,162,255,0.18);
      border-color: rgba(122,162,255,0.4);
    }

    .cards {
      padding: 18px 20px 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .idx {
      color: var(--accent-2);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .05em;
    }

    .badge {
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .prompt {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.35;
    }

    .hint-box {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: -2px;
    }

    .hint-box.show {
      display: flex;
    }

    .hint {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(110,231,200,0.10);
      border: 1px solid rgba(110,231,200,0.22);
      color: #c8f6ea;
      font-size: 12px;
      line-height: 1;
    }

    .answer {
      color: #dce7ff;
      background: rgba(8, 12, 24, 0.36);
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 14px;
      display: none;
      font-size: 14px;
    }

    .answer.show { display: block; }

    .actions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .small {
      padding: 9px 12px;
      font-size: 13px;
    }

    .mastered {
      background: rgba(110,231,200,0.18) !important;
      border-color: rgba(110,231,200,0.38) !important;
    }

    .hide-keywords .answer .key {
      background: rgba(255,143,143,0.2);
      color: transparent;
      border-radius: 4px;
      user-select: none;
    }

    .hide-keywords.beginner-weak .answer .key {
      color: #ffd4d4;
      background: rgba(255,143,143,0.18);
      padding: 0 2px;
    }

    .hide-keywords.beginner-weak .answer .key .mask-rest {
      color: transparent;
      user-select: none;
    }

    .hide-keywords.beginner-strong .answer .key {
      color: #ffd4d4;
      background: rgba(255,143,143,0.18);
      padding: 0 2px;
    }

    .hide-keywords.beginner-strong .answer .key .mask-rest,
    .hide-keywords.beginner-strong .answer .key .mask-rest-strong {
      color: transparent;
      user-select: none;
    }

    .mode-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
    }

    .mode-title {
      font-size: 14px;
      color: var(--muted);
      padding: 0 6px 0 4px;
      white-space: nowrap;
    }

    .mode-btn {
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      background: transparent;
    }

    .mode-btn.active {
      background: rgba(122,162,255,0.18);
      border-color: rgba(122,162,255,0.4);
    }

    @media (max-width: 900px) {
      .stats, .cards { grid-template-columns: 1fr; }
      .section-head { flex-direction: column; }
      .prompt { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="section">
      <div class="section-head">
        <div class="title-wrap">
          <h1>证券金融考前记忆训练页</h1>
          <div class="desc">按模块刷题。可切换关键词遮挡、答案展开、双档提示强度和掌握进度追踪。</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="num" id="totalCount">49</div><div class="label">总考点</div></div>
          <div class="stat"><div class="num" id="moduleCount">8</div><div class="label">主题模块</div></div>
          <div class="stat"><div class="num" id="doneCount">0</div><div class="label">已标记掌握</div></div>
          <div class="stat"><div class="num" id="rateText">0%</div><div class="label">掌握进度</div></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="switch" id="toggleKeywords">
          <span class="switch-label">关键词遮挡</span>
          <span class="switch-pill"></span>
        </div>
        <div class="switch" id="toggleAnswers">
          <span class="switch-label">展开答案</span>
          <span class="switch-pill"></span>
        </div>
        <div class="mode-group" id="beginnerGroup">
          <span class="mode-title">提示强度</span>
          <button class="mode-btn active" data-mode="off">关闭</button>
          <button class="mode-btn" data-mode="weak">弱提示</button>
          <button class="mode-btn" data-mode="strong">强提示</button>
        </div>
        <button id="resetProgress">清空掌握记录</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>当前模块支持主动回忆与半提示回忆两种练习方式</span>
          <span id="modeText">当前：标准模式</span>
        </div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
      </div>

      <div class="module-tabs" id="moduleTabs"></div>
      <div class="cards" id="cards"></div>
    </section>
  </div>

  
  <script>
    const cardsEl = document.getElementById('cards');
    const moduleTabs = document.getElementById('moduleTabs');
    const doneCountEl = document.getElementById('doneCount');
    const rateTextEl = document.getElementById('rateText');
    const progressBar = document.getElementById('progressBar');
    const modeText = document.getElementById('modeText');

    const STORAGE_KEY = 'finance-memory-mastered-v4-txt';
    let mastered = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    let currentModule = '';
    let hideKeywords = false;
    let expandAnswers = false;
    let beginnerLevel = 'off';
    let data = [];
    let modules = [];

    function saveMastered() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...mastered]));
      updateProgress();
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('moduleCount').textContent = modules.length;
    }

    function updateProgress() {
      const done = [...mastered].filter(id => data.some(item => item.id === id)).length;
      const rate = data.length ? Math.round(done / data.length * 100) : 0;
      doneCountEl.textContent = done;
      rateTextEl.textContent = rate + '%';
      progressBar.style.width = rate + '%';
    }

    function setSwitch(el, on) {
      el.classList.toggle('on', on);
    }

    function applyModes() {
      document.body.classList.toggle('hide-keywords', hideKeywords);
      document.body.classList.toggle('beginner-weak', beginnerLevel === 'weak');
      document.body.classList.toggle('beginner-strong', beginnerLevel === 'strong');
      document.querySelectorAll('.answer').forEach(el => el.classList.toggle('show', expandAnswers));
      document.querySelectorAll('.toggle-answer').forEach(btn => {
        btn.textContent = expandAnswers ? '收起答案' : '显示答案';
      });
      document.querySelectorAll('.hint-box').forEach(box => {
        box.classList.toggle('show', beginnerLevel !== 'off');
      });

      const labels = [];
      labels.push(beginnerLevel === 'off' ? '标准模式' : (beginnerLevel === 'weak' ? '弱提示模式' : '强提示模式'));
      if (hideKeywords) labels.push('关键词遮挡开启');
      if (expandAnswers) labels.push('答案展开中');
      modeText.textContent = '当前：' + labels.join(' · ');
    }

    function extractKeys(answerHtml) {
      const matches = [...answerHtml.matchAll(/<span class='key'>(.*?)<\/span>/g)].map(m => m[1]);
      return matches;
    }

    function toHintByLevel(text) {
      const plain = text.replace(/<.*?>/g, '').trim();
      const chars = [...plain];
      if (beginnerLevel === 'strong') {
        if (chars.length <= 2) return plain;
        return chars.slice(0, 2).join('') + '…';
      }
      if (chars.length <= 1) return plain;
      return chars[0] + '…';
    }

    function maskKeywordSpans(html) {
      return html.replace(/<span class='key'>(.*?)<\/span>/g, (_, t) => {
        const chars = [...t];
        if (beginnerLevel === 'strong') {
          if (chars.length <= 2) return `<span class='key'>${t}</span>`;
          return `<span class='key'>${chars.slice(0, 2).join('')}<span class="mask-rest-strong">${chars.slice(2).join('')}</span></span>`;
        }
        if (chars.length <= 1) return `<span class='key'>${t}</span>`;
        return `<span class='key'>${chars[0]}<span class="mask-rest">${chars.slice(1).join('')}</span></span>`;
      });
    }

    function renderTabs() {
      moduleTabs.innerHTML = '';
      modules.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (m === currentModule ? ' active' : '');
        btn.textContent = m;
        btn.onclick = () => {
          currentModule = m;
          renderTabs();
          renderCards();
        };
        moduleTabs.appendChild(btn);
      });
    }

    function renderCards() {
      const list = data.filter(i => i.module === currentModule);
      cardsEl.innerHTML = '';
      if (!list.length) {
        cardsEl.innerHTML = `<div class="card"><div class="prompt">题库尚未载入。</div><div class="answer show">请确认 finance_question_bank.txt 与当前 HTML 位于同一路径。</div></div>`;
        return;
      }
      list.forEach(item => {
        const rawHints = extractKeys(item.a);
        const hints = beginnerLevel === 'strong' ? rawHints.slice(0, 6) : rawHints.slice(0, 4);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-top">
            <div class="idx">#${item.id.toString().padStart(2, '0')}</div>
            <div class="badge">${item.tag}</div>
          </div>
          <div class="prompt">${item.q}</div>
          <div class="hint-box">${hints.map(h => `<span class="hint">${toHintByLevel(h)}</span>`).join('')}</div>
          <div class="answer">${maskKeywordSpans(item.a)}</div>
          <div class="actions">
            <button class="small toggle-answer">${expandAnswers ? '收起答案' : '显示答案'}</button>
            <button class="small toggle-mastered ${mastered.has(item.id) ? 'mastered' : ''}">${mastered.has(item.id) ? '已掌握' : '标记掌握'}</button>
          </div>
        `;
        const ans = card.querySelector('.answer');
        const answerBtn = card.querySelector('.toggle-answer');
        const masteredBtn = card.querySelector('.toggle-mastered');

        ans.classList.toggle('show', expandAnswers);
        card.querySelector('.hint-box').classList.toggle('show', beginnerLevel !== 'off');

        answerBtn.onclick = () => {
          const willShow = !ans.classList.contains('show');
          ans.classList.toggle('show', willShow);
          answerBtn.textContent = willShow ? '收起答案' : '显示答案';
        };

        masteredBtn.onclick = () => {
          if (mastered.has(item.id)) {
            mastered.delete(item.id);
            masteredBtn.classList.remove('mastered');
            masteredBtn.textContent = '标记掌握';
          } else {
            mastered.add(item.id);
            masteredBtn.classList.add('mastered');
            masteredBtn.textContent = '已掌握';
          }
          saveMastered();
        };
        cardsEl.appendChild(card);
      });
      applyModes();
    }

    function parseQuestionBank(text) {
      const blocks = text.split(/^===\s*$/m).map(s => s.trim()).filter(Boolean);
      const items = [];
      for (const block of blocks) {
        if (block.startsWith('#')) continue;
        const lines = block.split(/\r?\n/);
        const map = {};
        for (const line of lines) {
          const m = line.match(/^(ID|MODULE|TAG|Q|A):\s*(.*)$/);
          if (m) map[m[1]] = m[2];
        }
        if (!map.MODULE || !map.TAG || !map.Q || !map.A) continue;
        items.push({
          id: Number(map.ID || items.length + 1),
          module: map.MODULE,
          tag: map.TAG,
          q: map.Q,
          a: map.A
        });
      }
      return items;
    }

    async function loadQuestionBank() {
      try {
        const res = await fetch('./finance_question_bank.txt?v=1');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        data = parseQuestionBank(text);
        modules = [...new Set(data.map(i => i.module))];
        currentModule = modules[0] || '';
        updateStats();
        renderTabs();
        renderCards();
        updateProgress();
        applyModes();
      } catch (err) {
        updateStats();
        updateProgress();
        cardsEl.innerHTML = `
          <div class="card">
            <div class="prompt">题库加载失败</div>
            <div class="answer show">请把 <strong>finance_question_bank.txt</strong> 和当前 HTML 放在同一文件夹中，再通过本地服务器或 GitHub Pages 打开页面。</div>
          </div>
        `;
      }
    }

    document.getElementById('toggleKeywords').onclick = () => {
      hideKeywords = !hideKeywords;
      setSwitch(document.getElementById('toggleKeywords'), hideKeywords);
      applyModes();
    };

    document.getElementById('toggleAnswers').onclick = () => {
      expandAnswers = !expandAnswers;
      setSwitch(document.getElementById('toggleAnswers'), expandAnswers);
      applyModes();
    };

    document.querySelectorAll('#beginnerGroup .mode-btn').forEach(btn => {
      btn.onclick = () => {
        beginnerLevel = btn.dataset.mode;
        document.querySelectorAll('#beginnerGroup .mode-btn').forEach(el => el.classList.toggle('active', el === btn));
        renderCards();
      };
    });

    document.getElementById('resetProgress').onclick = () => {
      if (!confirm('确认清空全部掌握记录？')) return;
      mastered = new Set();
      saveMastered();
      renderCards();
    };

    loadQuestionBank();
  </script>
</body>
</html>

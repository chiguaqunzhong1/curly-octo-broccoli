<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>刷题练习</title>
<style>
:root {
  --bg:#f5f7fb; --panel:#fff; --line:#dde4ee; --text:#1f2937; --muted:#667085;
  --accent:#1f4b99; --accent-soft:#eaf1ff; --ok:#177245; --ok-soft:#ebf8f1;
  --bad:#b42318; --bad-soft:#fff1f1; --warn:#8a5a00; --warn-soft:#fff7e6;
  --shadow:0 8px 24px rgba(15,23,42,.06); --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text)}
.app{max-width:1420px;margin:0 auto;padding:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.stats{display:grid;grid-template-columns:1fr;gap:12px;padding:18px}
.stats-row{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
.stats-growth{display:block}
.stats-card{order:1}.metric .subvalue{margin-top:4px;font-size:12px;color:var(--muted)}.metric .mini-progress{margin-top:10px;height:8px;background:#eef2f7;border-radius:999px;overflow:hidden}.metric .mini-progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#6f92d6);width:0;transition:width .25s ease}.filter-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.filter-panel.collapsed .filter-body{display:none}.filter-toggle{display:inline-flex;align-items:center;gap:8px}.filter-toggle .arrow{display:inline-block;transition:transform .2s}.filter-panel:not(.collapsed) .filter-toggle .arrow{transform:rotate(90deg)}
.metric{background:#fafcff;border:1px solid var(--line);border-radius:12px;padding:14px}
.metric .label{color:var(--muted);font-size:12px;margin-bottom:6px}
.metric .value{font-weight:700;font-size:24px}
.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:18px;align-items:start}
.sidebar{padding:16px;position:sticky;top:18px;align-self:start}
.section-title{font-weight:700;font-size:14px;margin:0 0 10px}
.controls{display:grid;gap:14px}
label.small{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input[type="search"],select{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:0 12px;font-size:14px;color:var(--text);outline:none}
input[type="search"]:focus,select:focus{border-color:#b9c8e6;box-shadow:0 0 0 4px rgba(31,75,153,.08)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{height:42px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:0 14px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer}
button:hover{border-color:#c7d2e6;background:#fafcff}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.primary:hover{filter:brightness(.98)}
button.ghost{background:#fff}
button.warn{background:var(--warn-soft);border-color:#f1d69c;color:#704d00}
button.danger{background:#fff1f1;border-color:#f3c0bc;color:#9d1d15}
button:disabled{opacity:.45;cursor:not-allowed}
.segment{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px}
.segment button{height:38px;border-radius:9px;border:1px solid transparent;background:transparent;font-weight:700;color:var(--muted)}
.segment button.active{background:#fff;border-color:#cfd8e6;color:var(--accent);box-shadow:0 1px 2px rgba(16,24,40,.04)}
.switch-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fafcff}
.switch-row .text{font-size:14px;font-weight:700}
.switch-row .sub{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
input.switch{appearance:none;width:48px;height:28px;background:#d0d8e5;border-radius:999px;position:relative;cursor:pointer;transition:.2s}
input.switch::after{content:"";position:absolute;left:3px;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
input.switch:checked{background:var(--accent)}
input.switch:checked::after{left:23px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#f7f9fc;border:1px solid var(--line);font-size:12px;color:var(--muted)}
.mini-stats{display:flex;gap:8px;flex-wrap:wrap}
.progress-wrap{margin-top:10px}
.progress-bar{height:10px;background:#eef2f7;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#3d6bba);width:0}
.main{display:grid;gap:18px}
.toolbar{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar-left,.toolbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.question-card{padding:22px}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#f7f9fc;border:1px solid var(--line);font-size:12px;color:var(--muted)}
.material{padding:14px 16px;border-radius:12px;background:#fafcff;border:1px solid var(--line);white-space:pre-wrap;line-height:1.75;margin-bottom:14px}
.stem{font-size:20px;font-weight:700;line-height:1.7;margin-bottom:16px;white-space:pre-wrap}
.option-list{display:grid;gap:10px}
.option{display:grid;grid-template-columns:24px 38px 1fr;gap:12px;align-items:flex-start;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;transition:.15s}
.option:hover{border-color:#c9d5e8;background:#fcfdff}
.option input{margin-top:3px}
.option-key{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;background:#f6f8fc;border:1px solid var(--line);font-weight:800;color:#344054}
.option.correct{background:var(--ok-soft);border-color:#b7e1c9}
.option.wrong{background:var(--bad-soft);border-color:#f3c0bc}
.feedback{margin-top:16px;padding:14px 16px;border-radius:12px;border:1px solid var(--line);display:none;line-height:1.7}
.feedback.show{display:block}
.feedback.ok{background:var(--ok-soft);border-color:#b7e1c9;color:#0f5132}
.feedback.bad{background:var(--bad-soft);border-color:#f3c0bc;color:#7a271a}
.feedback.info{background:#f7f9fc;color:var(--muted)}
.analysis{display:none;margin-top:14px;padding:16px;border-radius:12px;background:#fafcff;border:1px solid var(--line);white-space:pre-wrap;line-height:1.8}
.analysis.show{display:block}
.footer-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
.footer-actions .spacer{flex:1 1 auto}
.footer-actions .nav-btn{min-width:96px}
.grid-card{padding:16px}
.grid-header{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:8px}
.qcell{height:40px;border-radius:10px;background:#fff;border:1px solid var(--line);font-weight:700;padding:0}
.qcell.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.qcell.done{background:#f8fafc}
.qcell.right{border-color:#b7e1c9}
.qcell.wrong{border-color:#f3c0bc;background:#fff7f7}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:12px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;border:1px solid var(--line);background:#fff}
.dot.current{background:var(--accent-soft);border-color:var(--accent)}
.dot.done{background:#f8fafc}
.dot.right{background:var(--ok-soft);border-color:#b7e1c9}
.dot.wrong{background:var(--bad-soft);border-color:#f3c0bc}
.empty-state{padding:34px 18px;text-align:center;color:var(--muted)}
.nav-toggle{display:inline-flex;align-items:center;gap:8px}
.nav-toggle .arrow{display:inline-block;transition:transform .2s}
.nav-toggle.expanded .arrow{transform:rotate(90deg)}
.collapsed .grid,.collapsed .legend{display:none}
.collapsed .grid-header{margin-bottom:0}
@media (max-width:1180px){.stats-row{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:1100px){.layout{grid-template-columns:1fr} .sidebar{position:static}}
@media (max-width:680px){.app{padding:12px} .layout{display:flex;flex-direction:column} .main{order:1} .sidebar{order:2} .grid-card{order:1} .question-card{order:2} .stats-card{order:3} .sidebar{order:4} .stats-row{grid-template-columns:repeat(2,minmax(0,1fr))} .stem{font-size:18px} .row2,.btns{grid-template-columns:1fr} .footer-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px} .footer-actions .primary{order:2} .footer-actions .nav-btn.prev{order:1} .footer-actions .nav-btn.next{order:3} .footer-actions #showBtn{order:4} .footer-actions #redoBtn{order:5;grid-column:1 / -1} .footer-actions .spacer{display:none}}

.fx-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9998}
.particle{position:absolute;width:10px;height:10px;border-radius:50%;opacity:.95;animation:particle-burst .9s ease-out forwards}
@keyframes particle-burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(.2);opacity:0}}
.question-card.correct-pop{animation:correct-pulse .55s ease}
.question-card.wrong-shake{animation:wrong-shake .42s ease}
@keyframes correct-pulse{0%{box-shadow:0 0 0 0 rgba(23,114,69,.22);transform:scale(1)}45%{box-shadow:0 0 0 16px rgba(23,114,69,0);transform:scale(1.01)}100%{box-shadow:0 0 0 0 rgba(23,114,69,0);transform:scale(1)}}
@keyframes wrong-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.toast-stack{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:grid;gap:10px;z-index:10000;pointer-events:none;width:min(92vw,520px)}
.toast{padding:12px 16px;border-radius:14px;color:#fff;font-weight:700;box-shadow:0 14px 30px rgba(15,23,42,.18);animation:toast-in .32s ease, toast-out .32s ease 2.6s forwards}
.toast.ok{background:linear-gradient(135deg,#177245,#1e8d57)}
.toast.bad{background:linear-gradient(135deg,#b42318,#d92d20)}
.toast.info{background:linear-gradient(135deg,#344054,#475467)}
.toast.gold{background:linear-gradient(135deg,#8a5a00,#d4a017)}
@keyframes toast-in{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toast-out{to{opacity:0;transform:translateY(16px) scale(.98)}}
.achievement-stack{position:fixed;right:18px;top:18px;display:grid;gap:10px;z-index:10000;pointer-events:none;width:min(86vw,340px)}
.achievement-card{background:linear-gradient(135deg,#1f4b99,#345faa);color:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 16px 34px rgba(15,23,42,.18);animation:achievement-in .42s cubic-bezier(.2,.8,.2,1), toast-out .32s ease 3.3s forwards}
.achievement-card .small{display:block;color:rgba(255,255,255,.82);font-size:12px;margin-bottom:6px}
.achievement-card .title{font-size:16px;font-weight:800}
.achievement-card .desc{margin-top:4px;font-size:13px;line-height:1.55;color:rgba(255,255,255,.88)}
@keyframes achievement-in{from{opacity:0;transform:translateX(42px)}to{opacity:1;transform:translateX(0)}}
.combo-banner{position:fixed;left:50%;top:22%;transform:translateX(-50%) scale(.8);padding:18px 28px;border-radius:22px;background:linear-gradient(135deg,rgba(31,75,153,.96),rgba(111,146,214,.96));color:#fff;font-weight:900;font-size:32px;letter-spacing:.03em;box-shadow:0 18px 40px rgba(31,75,153,.28);opacity:0;pointer-events:none;z-index:9999;text-align:center}
.combo-banner.show{animation:combo-pop .9s ease forwards}
.combo-banner small{display:block;font-size:14px;font-weight:700;opacity:.92;margin-top:6px}
@keyframes combo-pop{0%{opacity:0;transform:translateX(-50%) scale(.72)}18%{opacity:1;transform:translateX(-50%) scale(1.08)}70%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.96)}}
.level-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.28);opacity:0;pointer-events:none;z-index:10001}
.level-modal.show{animation:fade-in-out 1.7s ease forwards}
.level-modal .panel{background:linear-gradient(135deg,#fff3c4,#ffd166);border:1px solid #f1d69c;color:#7a5200;border-radius:24px;padding:22px 28px;min-width:min(88vw,380px);text-align:center;box-shadow:0 24px 50px rgba(138,90,0,.22)}
.level-modal .title{font-size:28px;font-weight:900;margin-bottom:8px}
.level-modal .desc{font-size:15px;font-weight:700}
@keyframes fade-in-out{0%{opacity:0}15%,75%{opacity:1;pointer-events:auto}100%{opacity:0}}
@media (max-width:680px){.achievement-stack{left:12px;right:12px;top:auto;bottom:88px;width:auto}.combo-banner{font-size:26px;top:18%;padding:16px 22px}.level-modal .panel{padding:20px 18px}.toast-stack{bottom:12px}}


textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px;font-size:13px;color:var(--text);outline:none;resize:vertical;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}textarea:focus{border-color:#b9c8e6;box-shadow:0 0 0 4px rgba(31,75,153,.08)}
</style>
</head>
<body>
<div class="app">
<div class="layout">
    <aside class="card sidebar filter-panel collapsed" id="filterPanel">
      <div class="filter-header">
        <div class="section-title" style="margin:0">筛选</div>
        <button class="ghost filter-toggle" id="toggleFilterBtn"><span class="arrow">▶</span><span id="filterToggleText">展开筛选</span></button>
      </div>
      <div class="controls filter-body">
        <section class="card filter-panel collapsed" id="importPanel" style="padding:14px;background:#fafcff;box-shadow:none">
          <div class="filter-header" style="margin-bottom:0">
            <div class="section-title" style="margin:0">题库导入</div>
            <button class="ghost filter-toggle" id="toggleImportBtn"><span class="arrow">▶</span><span id="importToggleText">展开导入</span></button>
          </div>
          <div class="controls filter-body" style="margin-top:12px">
            <div>
              <label class="small">导入 TXT 题库文件</label>
              <input id="txtFileInput" type="file" accept=".txt,text/plain" style="width:100%">
            </div>
            <div>
              <label class="small">或粘贴题库文本</label>
              <textarea id="txtPasteInput" placeholder='支持两种格式：
1. 纯 JSON 数组
2. const QUESTIONS = [...]'></textarea>
            </div>
            <div class="btns">
              <button id="loadPasteBtn" class="primary">加载粘贴题库</button>
              <button id="clearImportedBankBtn" class="ghost">清除已导入题库</button>
            </div>
            <div class="pill" id="importStatus">当前未导入题库</div>
          </div>
        </section>
        <div>
          <label class="small">搜索题干 / 解析</label>
          <input id="searchInput" type="search" placeholder="输入关键词" />
        </div>
        <div>
          <label class="small">讲次</label>
          <select id="lectureSelect"></select>
        </div>
        <div class="row2">
          <div>
            <label class="small">章节</label>
            <select id="chapterSelect"></select>
          </div>
          <div>
            <label class="small">题型</label>
            <select id="typeSelect">
              <option value="">全部题型</option>
              <option value="single">单选题</option>
              <option value="multiple">多选题</option>
              <option value="judge">判断题</option>
            </select>
          </div>
        </div>
        <div>
          <label class="small">作答模式</label>
          <div class="segment" id="answerModeSegment">
            <button type="button" data-value="instant">⚡ 即选即答模式</button>
            <button type="button" data-value="manual">🔘 手动提交模式</button>
          </div>
        </div>
        <div>
          <label class="small">排序模式</label>
          <div class="segment" id="orderSegment">
            <button type="button" data-value="normal">顺序练习</button>
            <button type="button" data-value="random">题目随机</button>
          </div>
        </div>
        <div class="switch-row">
          <div>
            <div class="text">选项随机</div>
            <span class="sub">只随机选项内容位置，标签始终固定为 A / B / C / D</span>
          </div>
          <input id="shuffleOptionOrder" class="switch" type="checkbox">
        </div>
        <div class="btns">
          <button id="resetFiltersBtn" class="ghost">重置筛选</button>
          <button id="resetProgressBtn" class="warn">清空进度</button>
        </div>
        <div>
          <div class="section-title">当前题组</div>
          <div class="mini-stats">
            <div class="pill">筛选后题数 <strong id="scopeCount">0</strong></div>
            <div class="pill">当前序号 <strong id="scopeIndex">0 / 0</strong></div>
          </div>
          <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
        </div>
      </div>
    </aside>
    <main class="main">
      <section class="card grid-card collapsed" id="gridCard">
        <div class="grid-header">
          <button class="ghost nav-toggle" id="toggleNavBtn"><span class="arrow">▶</span><span id="navToggleText">展开题目导航</span></button>
          <div class="pill">点击数字可快速跳题</div>
        </div>
        <div class="grid" id="gridNav"></div>
        <div class="legend">
          <span><i class="dot current"></i>当前</span>
          <span><i class="dot done"></i>已作答</span>
          <span><i class="dot right"></i>答对</span>
          <span><i class="dot wrong"></i>答错</span>
        </div>
      </section>
      <section class="card question-card" id="questionContainer">
        <div class="empty-state">未检测到题库数据。请在左侧展开“题库导入”，导入 txt 题库。</div>
      </section>
      <section class="card stats stats-card" id="statsCard">
        <div class="stats-row">
          <div class="metric"><div class="label">题目总数</div><div class="value" id="statTotal">0</div></div>
          <div class="metric"><div class="label">已作答</div><div class="value" id="statDone">0</div></div>
          <div class="metric"><div class="label">答对数</div><div class="value" id="statRight">0</div></div>
          <div class="metric"><div class="label">正确率</div><div class="value" id="statRate">0%</div></div>
          <div class="metric"><div class="label">当前连击</div><div class="value" id="statCombo">0</div><div class="subvalue" id="statMaxCombo">最高连击 0</div></div>
          <div class="metric"><div class="label">总分</div><div class="value" id="statScore">0</div><div class="subvalue" id="statScopeText">得分倍率 x1.0</div></div>
        </div>
        <div class="metric stats-growth"><div class="label">成长进度</div><div class="value" id="statLevel">Lv.1</div><div class="subvalue" id="statGrowthText">0 / 100 XP</div><div class="mini-progress"><span id="statXpFill"></span></div></div>
      </section>
    </main>
  </div>
</div>

<div class="fx-layer" id="fxLayer"></div>
<div class="toast-stack" id="toastStack"></div>
<div class="achievement-stack" id="achievementStack"></div>
<div class="combo-banner" id="comboBanner"></div>
<div class="level-modal" id="levelUpModal"><div class="panel"><div class="title" id="levelUpTitle">升级啦！</div><div class="desc" id="levelUpDesc">已达到 Lv.2</div></div></div>
<script>
let QUESTIONS = [];
const STORAGE_KEY = "financial_quiz_practice_state_v6";
const IMPORT_TEXT_KEY = "finance-quiz-imported-text";
const DEFAULT_BANK_FILENAME = "question_full.txt";
const state = {
  filters: { search:"", lecture:"", chapter:"", type:"", order:"normal", shuffleOptions:false, answerMode:"instant" },
  currentIndex: 0,
  records: {},
  randomOrderSeed: {},
  optionOrders: {},
  navExpanded: false,
  filtersCollapsed: true,
  importCollapsed: true,
  game: { score:0, combo:0, maxCombo:0, xp:0, level:1, achievements:{}, rightCount:0 }
};
function parseQuestionText(raw) {
  const text = (raw || '').trim();
  if (!text) throw new Error('题库内容为空');
  const m = text.match(/(?:const|let|var)\s+QUESTIONS\s*=\s*([\s\S]*?);?\s*$/);
  const jsonText = (m ? m[1] : text).trim();
  const parsed = JSON.parse(jsonText);
  if (!Array.isArray(parsed)) throw new Error('题库格式错误：解析结果不是数组');
  return parsed;
}
function setQuestions(list) {
  QUESTIONS = Array.isArray(list) ? list : [];
}
function importQuestions(raw, options = {}) {
  const { resetProgress = true, persist = true, toast = true } = options;
  const parsed = parseQuestionText(raw);
  setQuestions(parsed);
  if (persist) localStorage.setItem(IMPORT_TEXT_KEY, raw);
  if (resetProgress) {
    state.records = {};
    state.randomOrderSeed = {};
    state.currentIndex = 0;
    state.game = { score:0, combo:0, maxCombo:0, xp:0, level:1, achievements:{}, rightCount:0 };
  }
  updateFilterOptions();
  render();
  updateImportStatus();
  if (toast) showToast(`题库导入成功，共 ${QUESTIONS.length} 题`, 'ok');

async function tryAutoLoadDefaultBank() {

      return false;
    }

    const res = await fetch(`./${DEFAULT_BANK_FILENAME}?_=${Date.now()}`, {
      cache: 'no-store'
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const raw = await res.text();
    importQuestions(raw, {
      resetProgress: false,
      persist: true,
      toast: false
    });

    showToast(`已自动加载 ${DEFAULT_BANK_FILENAME}`, 'info');
    return true;
  } catch (err) {
    console.warn('自动加载默认题库失败：', err);
    return false;
  }

function loadImportedBankFromLocal() {
  try {
    const saved = localStorage.getItem(IMPORT_TEXT_KEY);
    if (!saved || !saved.trim()) return false;

    importQuestions(saved, {
      resetProgress: false,
      persist: false,
      toast: false
    });

    showToast('已自动恢复上次导入的题库', 'info');
    return true;
  } catch (err) {
    console.warn('恢复本地题库失败：', err);
    return false;
  }
}

async function initQuestionBank() {

    updateImportStatus();
  }

function applyGameResult(correct) { const payload = { correct, gainedScore:0, gainedXp:0, combo: state.game.combo || 0, leveledUp:false, level: state.game.level || 1, achievements: [] }; state.game.rightCount ||= 0; if (correct) { state.game.combo = (state.game.combo || 0) + 1; state.game.maxCombo = Math.max(state.game.maxCombo || 0, state.game.combo); state.game.rightCount = (state.game.rightCount || 0) + 1; const multiplier = 1 + Math.floor((state.game.combo || 0) / 5) * 0.5; payload.gainedScore = Math.round(100 * multiplier); payload.gainedXp = Math.round(20 * multiplier); state.game.score = Math.round((state.game.score || 0) + payload.gainedScore); state.game.xp = (state.game.xp || 0) + payload.gainedXp; payload.combo = state.game.combo; } else { state.game.combo = 0; payload.gainedXp = 5; state.game.xp = (state.game.xp || 0) + payload.gainedXp; payload.combo = 0; } while ((state.game.xp || 0) >= 100) { state.game.xp -= 100; state.game.level = (state.game.level || 1) + 1; payload.leveledUp = true; } payload.level = state.game.level || 1; payload.achievements = checkAchievements(); return payload; }
function getBaseFilteredQuestions() { return QUESTIONS.filter(q => { const searchText = ((q.stem||'') + '\n' + (q.analysis || '') + '\n' + (q.material || '')).toLowerCase(); if (state.filters.search && !searchText.includes(state.filters.search.toLowerCase())) return false; if (state.filters.lecture && q.lecture !== state.filters.lecture) return false; if (state.filters.chapter && q.chapter !== state.filters.chapter) return false; if (state.filters.type && q.type !== state.filters.type) return false; return true; }); }

function renderGrid(list) { gridNav.innerHTML = ''; list.forEach((q, idx) => { const rec = state.records[q.id] || {}; const cell = document.createElement('button'); cell.className = 'qcell'; if (idx === state.currentIndex) cell.classList.add('current'); if (rec.result) cell.classList.add('done'); if (rec.result === 'right') cell.classList.add('right'); if (rec.result === 'wrong') cell.classList.add('wrong'); cell.textContent = idx + 1; cell.title = q.stem || ''; cell.addEventListener('click', () => { state.currentIndex = idx; saveState(); render(); }); gridNav.appendChild(cell); }); }

function renderToolbar(list) { scopeCount.textContent = list.length; scopeIndex.textContent = list.length ? `${state.currentIndex + 1} / ${list.length}` : '0 / 0'; progressFill.style.width = (list.length ? Math.round((state.currentIndex + 1) / list.length * 100) : 0) + '%'; }
function render() { const list = getFilteredQuestions(); updateStats(list); renderToolbar(list); renderQuestion(list); renderGrid(list); syncSegment('answerModeSegment', state.filters.answerMode); syncSegment('orderSegment', state.filters.order); syncNavUI(); syncFilterUI(); syncImportUI(); saveState(); }

async function init() {
  const autoLoaded = await tryAutoLoadDefaultBank();
  if (!autoLoaded) loadImportedBank();
  loadState();
  updateFilterOptions();
  updateImportStatus();
  bindEvents();
  render();
  if (!autoLoaded && location.protocol === 'file:') {
